name: release

# Tag-triggered build + publish. Push a vX.Y.Z tag (matching the version in
# pyproject.toml) to build the sdist + wheel and publish to PyPI via trusted
# publishing (no API token stored). Pure-Python package: one ubuntu build job,
# no compile matrix.
#
# Prerequisites (one-time, before the first real release):
#   * a PyPI project + a Trusted Publisher entry for this repo/workflow;
#   * a GitHub Environment named "pypi" (optionally with required reviewers).

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

jobs:
  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match pyproject.toml ($pkg_version)"
            exit 1
          fi
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*

  publish:
    name: publish to PyPI
    needs: [build]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # trusted publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
